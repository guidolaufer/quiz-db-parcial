<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Quiz — Bases de Datos 2</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    html { font-size: 16px; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      /* safe-area para iPhone con notch */
      padding: 1.25rem env(safe-area-inset-right, 0.75rem) 4rem env(safe-area-inset-left, 0.75rem);
      padding-left: max(0.75rem, env(safe-area-inset-left));
      padding-right: max(0.75rem, env(safe-area-inset-right));
    }

    /* ── HEADER ─────────────────────────────── */
    header { text-align: center; margin-bottom: 1.5rem; }
    header h1 {
      font-size: clamp(1.15rem, 5.5vw, 1.7rem);
      color: #7dd3fc; margin-bottom: 0.25rem; line-height: 1.3;
    }
    header p { color: #94a3b8; font-size: clamp(0.72rem, 3vw, 0.85rem); line-height: 1.5; }

    /* ── PROGRESS ───────────────────────────── */
    #progress-bar-wrap { max-width: 680px; margin: 0 auto 1.25rem; }
    #progress-label {
      display: flex; justify-content: space-between;
      font-size: 0.75rem; color: #64748b; margin-bottom: 0.35rem;
    }
    #progress-bar { height: 6px; background: #1e293b; border-radius: 99px; overflow: hidden; }
    #progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #3b82f6, #7dd3fc);
      border-radius: 99px; transition: width 0.4s ease; width: 0%;
    }

    /* ── CARD ───────────────────────────────── */
    .card {
      background: #1e293b; border: 1px solid #334155;
      border-radius: 14px;
      padding: clamp(1rem, 4vw, 1.5rem);
      max-width: 680px; margin: 0 auto 1rem;
      /* evita que la card se salga en mobile */
      width: 100%;
    }

    .badge {
      display: inline-block; font-size: 0.65rem; font-weight: 700;
      letter-spacing: 0.07em; text-transform: uppercase;
      padding: 0.2rem 0.6rem; border-radius: 99px; margin-bottom: 0.85rem;
    }
    .badge.mongo     { background: #14532d; color: #86efac; }
    .badge.cassandra { background: #1e3a5f; color: #93c5fd; }
    .badge.teoria    { background: #3b1f5e; color: #c4b5fd; }
    .badge.neo4j     { background: #3b2a0f; color: #fcd34d; }
    .badge.grafo     { background: #2d1a4e; color: #d8b4fe; }
    .badge.practica  { background: #2d1b00; color: #fbbf24; }

    .card h2 {
      font-size: clamp(0.9rem, 3.8vw, 1.05rem);
      line-height: 1.65; margin-bottom: 1rem; color: #f1f5f9;
      word-break: break-word;
    }

    /* ── CÓDIGO ─────────────────────────────── */
    pre {
      background: #0f172a; border: 1px solid #263148;
      border-radius: 8px;
      /* clave: permite scroll horizontal sin romper el layout */
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      padding: 0.7rem 0.85rem;
      font-size: clamp(0.65rem, 2.5vw, 0.78rem);
      line-height: 1.6; color: #e2e8f0;
      margin-bottom: 0;
      /* evita que el texto se parta en palabras incorrectas */
      white-space: pre;
      word-break: normal;
      max-width: 100%;
    }
    code { font-family: ui-monospace, 'Cascadia Code', 'Fira Code', monospace; }

    /* inline code en preguntas */
    h2 code, .feedback code, .text code {
      background: #1e293b; border: 1px solid #334155;
      border-radius: 4px; padding: 0.1em 0.35em;
      font-size: 0.88em; color: #93c5fd;
      word-break: break-all;
    }

    /* ── OPCIONES ───────────────────────────── */
    .options { display: flex; flex-direction: column; gap: 0.55rem; }

    .option {
      display: flex; align-items: flex-start; gap: 0.75rem;
      background: #0f172a; border: 1.5px solid #334155;
      border-radius: 10px;
      padding: clamp(0.65rem, 2.5vw, 0.85rem) clamp(0.7rem, 2.5vw, 0.9rem);
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      user-select: none;
      /* importante: evita overflow en opciones con código */
      min-width: 0;
      overflow: hidden;
    }
    .option:active:not(.disabled) { background: #172033; border-color: #3b82f6; }
    @media (hover: hover) {
      .option:hover:not(.disabled) { border-color: #3b82f6; background: #172033; }
    }

    .option .letter {
      flex-shrink: 0;
      width: 28px; height: 28px; border-radius: 50%;
      background: #1e293b; border: 1.5px solid #475569;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.75rem; font-weight: 700; color: #94a3b8;
      transition: all 0.15s;
      /* no se achica nunca */
      min-width: 28px;
    }

    .option .text {
      font-size: clamp(0.82rem, 3.2vw, 0.88rem);
      line-height: 1.55; color: #cbd5e1;
      /* permite que el texto se adapte sin desbordarse */
      min-width: 0;
      flex: 1;
      word-break: break-word;
    }
    .option .text pre {
      margin-top: 0.4rem;
      font-size: clamp(0.6rem, 2.3vw, 0.73rem);
      white-space: pre-wrap;
      word-break: break-all;
      overflow-x: visible;
    }

    /* estados */
    .option.correct         { border-color: #22c55e; background: #052e16; }
    .option.correct .letter { background: #22c55e; border-color: #22c55e; color: #fff; }
    .option.wrong           { border-color: #ef4444; background: #2d0a0a; }
    .option.wrong .letter   { background: #ef4444; border-color: #ef4444; color: #fff; }
    .option.dimmed          { opacity: 0.35; }
    .option.disabled        { cursor: default; }

    /* ── FEEDBACK ───────────────────────────── */
    .feedback {
      display: none; margin-top: 0.9rem;
      padding: clamp(0.75rem, 3vw, 1rem);
      border-radius: 10px;
      font-size: clamp(0.8rem, 3vw, 0.87rem); line-height: 1.65;
      word-break: break-word;
    }
    .feedback.show { display: block; }
    .feedback.ok   { background: #052e16; border: 1px solid #16a34a; color: #86efac; }
    .feedback.fail { background: #2d0a0a; border: 1px solid #dc2626; color: #fca5a5; }
    .feedback strong { display: block; margin-bottom: 0.3rem; font-size: 0.92rem; }

    /* ── BOTONES NAV ────────────────────────── */
    .btn-row { display: flex; gap: 0.6rem; margin-top: 1rem; }

    .btn-prev {
      flex: 0 0 auto;
      padding: 0.8rem 1rem;
      background: #1e293b; color: #94a3b8;
      border: 1.5px solid #334155; border-radius: 10px;
      font-size: clamp(0.82rem, 3vw, 0.92rem); font-weight: 600;
      cursor: pointer; display: none;
      min-height: 48px; touch-action: manipulation;
    }
    .btn-prev:active { background: #273548; }
    .btn-prev.show { display: block; }

    .btn-next {
      flex: 1;
      padding: 0.8rem;
      background: #3b82f6; color: #fff;
      border: none; border-radius: 10px;
      font-size: clamp(0.82rem, 3vw, 0.92rem); font-weight: 600;
      cursor: pointer; display: none;
      min-height: 48px; touch-action: manipulation;
    }
    .btn-next:active { background: #2563eb; }
    .btn-next.show { display: block; }

    /* ── SCORE SCREEN ───────────────────────── */
    #score-screen {
      display: none; text-align: center;
      max-width: 680px; margin: 0 auto;
      background: #1e293b; border: 1px solid #334155;
      border-radius: 14px; padding: clamp(1.5rem, 5vw, 2.5rem) clamp(1rem, 4vw, 1.5rem);
      width: 100%;
    }
    #score-screen h2  { font-size: clamp(1.2rem, 5vw, 1.4rem); color: #7dd3fc; margin-bottom: 0.4rem; }
    #score-screen .big {
      font-size: clamp(2.8rem, 12vw, 3.5rem); font-weight: 800;
      color: #f1f5f9; margin: 0.6rem 0;
    }
    #score-screen p { color: #94a3b8; margin-bottom: 1.25rem; font-size: clamp(0.85rem, 3vw, 0.92rem); }

    .breakdown {
      display: flex; justify-content: center; gap: 0.6rem;
      flex-wrap: wrap; margin-bottom: 1.25rem;
    }
    .breakdown-item {
      background: #0f172a; border: 1px solid #334155; border-radius: 10px;
      padding: 0.55rem 0.9rem; font-size: 0.78rem; color: #94a3b8;
    }
    .breakdown-item span {
      display: block; font-size: 1.15rem; font-weight: 700;
      color: #f1f5f9; margin-bottom: 0.1rem;
    }

    .btn-restart {
      padding: 0.8rem 2rem; background: #3b82f6; color: #fff;
      border: none; border-radius: 10px;
      font-size: clamp(0.9rem, 3.5vw, 1rem); font-weight: 600;
      cursor: pointer; min-height: 48px; touch-action: manipulation;
      width: 100%; max-width: 280px;
    }
    .btn-restart:active { background: #2563eb; }
  </style>
</head>
<body>

<header>
  <h1>Quiz — Bases de Datos 2</h1>
  <p>NoSQL · CAP · ACID/BASE · Fragmentación · MongoDB · Cassandra · Neo4j</p>
</header>

<div id="progress-bar-wrap">
  <div id="progress-label">
    <span id="prog-text">Pregunta 1</span>
    <span id="score-text">0 correctas</span>
  </div>
  <div id="progress-bar"><div id="progress-fill"></div></div>
</div>

<div id="quiz-container"></div>

<div id="score-screen">
  <h2>Resultado final</h2>
  <div class="big" id="final-score"></div>
  <p id="final-msg"></p>
  <div class="breakdown" id="breakdown"></div>
  <button class="btn-restart" onclick="restart()">Volver a intentar</button>
</div>

<script>
const questions = [

  // ══════════════════════════════════════════════════════════
  // MONGODB — FIND Y PROYECCIONES
  // ══════════════════════════════════════════════════════════
  {
    db:"mongo",
    q:"¿Cuál consulta devuelve <strong>solo</strong> <code>customerid</code> y <code>total</code> (sin <code>_id</code>) de las órdenes <code>pending</code>?",
    options:[
      {code:`db.orders.find({ status:"pending" },{ customerid:1, total:1 })`},
      {code:`db.orders.find({ status:"pending" },{ customerid:1, total:1, _id:0 })`},
      {code:`db.orders.find({ customerid:1, total:1 },{ status:"pending" })`},
      {code:`db.orders.find({ status:"pending" }).project({ customerid, total })`},
    ],
    correct:1,
    explanation:"<strong>b) es correcta.</strong> <code>_id</code> se incluye por defecto — hay que excluirlo con <code>_id:0</code>. En c) los argumentos están invertidos. <code>.project()</code> no existe en el shell de MongoDB."
  },
  {
    db:"mongo",
    q:"¿Qué devuelve <code>db.orders.find({}).sort({ total:-1 }).skip(5).limit(3)</code>?",
    options:[
      {text:"Las 3 órdenes con mayor total"},
      {text:"Las órdenes en posición 6°, 7° y 8° ordenadas por total descendente"},
      {text:"Las 3 órdenes con menor total"},
      {text:"Error — skip y limit no se pueden encadenar"},
    ],
    correct:1,
    explanation:"<strong>b) es correcta.</strong> Ordena por total descendente, saltea las primeras 5, devuelve las 3 siguientes. Es paginación — equivale a la página 2 con tamaño de página 5."
  },
  {
    db:"mongo",
    q:"¿Cuál consulta devuelve las <strong>3 órdenes más antiguas</strong> con <code>status = \"delivered\"</code>?",
    options:[
      {code:`db.orders.find({ status:"delivered" }).sort({ orderDate:-1 }).limit(3)`},
      {code:`db.orders.find({ status:"delivered" }).sort({ orderDate:1 }).limit(3)`},
      {code:`db.orders.find({ status:"delivered" }).limit(3)`},
      {code:`db.orders.find({ status:"delivered" }).sort({ orderDate:1 }).skip(3)`},
    ],
    correct:1,
    explanation:"<strong>b) es correcta.</strong> <code>orderDate:1</code> es ascendente (más antiguo primero). <code>-1</code> sería descendente (más reciente primero). c) no garantiza orden. d) saltea en vez de limitar."
  },

  // ══════════════════════════════════════════════════════════
  // MONGODB — OPERADORES LÓGICOS Y COMPARACIÓN
  // ══════════════════════════════════════════════════════════
  {
    db:"mongo",
    q:"Querés órdenes cuyo <code>total</code> sea mayor a 500 <strong>o</strong> cuyo <code>status</code> sea <code>\"cancelled\"</code>. ¿Cuál es correcta?",
    options:[
      {code:`db.orders.find({ total:{ $gt:500 }, status:"cancelled" })`},
      {code:`db.orders.find({ $or:[{ total:{ $gt:500 } },{ status:"cancelled" }] })`},
      {code:`db.orders.find({ $and:[{ total:{ $gt:500 } },{ status:"cancelled" }] })`},
      {code:`db.orders.find({ total:{ $gt:500 } || status:"cancelled" })`},
    ],
    correct:1,
    explanation:"<strong>b) es correcta.</strong> <code>$or</code> recibe un array de condiciones. a) usa AND implícito — ambas deben cumplirse. c) es AND explícito. d) no es sintaxis JS/JSON válida."
  },
  {
    db:"mongo",
    q:"¿Cuándo es <strong>obligatorio</strong> usar <code>$and</code> explícito en vez del AND implícito (coma)?",
    options:[
      {text:"Cuando hay más de 3 condiciones"},
      {text:"Cuando las condiciones están sobre campos distintos"},
      {text:"Cuando tenés dos condiciones sobre el mismo campo que no se pueden combinar en un objeto"},
      {text:"Nunca — $and y la coma siempre son intercambiables"},
    ],
    correct:2,
    explanation:"<strong>c) es correcta.</strong> En JS un objeto no puede tener dos claves iguales — la segunda pisa a la primera. Ejemplo: <code>{ total:{$gt:50}, total:{$lt:200} }</code> solo aplica la segunda. Con <code>$and</code> explícito ambas se evalúan."
  },
  {
    db:"mongo",
    q:"¿Cuál consulta devuelve órdenes con <code>total</code> entre 50 y 200 <strong>inclusive</strong>?",
    options:[
      {code:`db.orders.find({ total:{ $gt:50, $lt:200 } })`},
      {code:`db.orders.find({ total:{ $gte:50, $lte:200 } })`},
      {code:`db.orders.find({ total:{ $between:[50,200] } })`},
      {code:`db.orders.find({ total:50, total:200 })`},
    ],
    correct:1,
    explanation:"<strong>b) es correcta.</strong> <code>$gte</code> y <code>$lte</code> son inclusivos. a) excluye los extremos con <code>$gt</code>/<code>$lt</code>. <code>$between</code> no existe en MongoDB. d) la segunda clave pisa a la primera."
  },
  {
    db:"mongo",
    q:"¿Cuál consulta devuelve órdenes donde <code>status</code> no sea <code>\"cancelled\"</code>?",
    options:[
      {code:`db.orders.find({ status:{ $not:"cancelled" } })`},
      {code:`db.orders.find({ status:{ $ne:"cancelled" } })`},
      {code:`db.orders.find({ $nor:[{ status:"cancelled" }] })`},
      {code:`db.orders.find({ status:{ $nin:"cancelled" } })`},
    ],
    correct:1,
    explanation:"<strong>b) es correcta.</strong> <code>$ne</code> es 'not equal'. <code>$not</code> requiere un operador adentro, no un valor directo. <code>$nor</code> también funciona pero es más verboso. <code>$nin</code> requiere un array como argumento."
  },
  {
    db:"mongo",
    q:"¿Qué hace <code>$exists: true</code> en una consulta MongoDB?",
    options:[
      {text:"Devuelve documentos donde el campo tiene valor truthy (no null, no 0)"},
      {text:"Devuelve documentos donde el campo existe en el documento, sin importar su valor"},
      {text:"Devuelve documentos donde el campo tiene un índice creado"},
      {text:"Es equivalente a != null"},
    ],
    correct:1,
    explanation:"<strong>b) es correcta.</strong> <code>{ campo:{ $exists:true } }</code> devuelve documentos que tienen el campo definido, aunque su valor sea <code>null</code>, <code>0</code> o <code>false</code>. En MongoDB los documentos son flexibles — un campo puede directamente no existir en un documento."
  },

  // ══════════════════════════════════════════════════════════
  // MONGODB — ARRAYS
  // ══════════════════════════════════════════════════════════
  {
    db:"mongo",
    q:"El campo <code>tags</code> es un array. ¿Cuál consulta devuelve documentos donde <code>tags</code> contenga <code>\"express\"</code>?",
    options:[
      {code:`db.orders.find({ tags:{ $contains:"express" } })`},
      {code:`db.orders.find({ tags:"express" })`},
      {code:`db.orders.find({ tags:{ $in:"express" } })`},
      {code:`db.orders.find({ tags:{ $elemMatch:"express" } })`},
    ],
    correct:1,
    explanation:"<strong>b) es correcta.</strong> En MongoDB, comparar un campo array con un escalar busca si ese valor está contenido en el array. <code>$contains</code> no existe. <code>$in</code> requiere un array de valores. <code>$elemMatch</code> con escalar es inválido."
  },
  {
    db:"mongo",
    q:"¿Cuál consulta devuelve documentos donde <code>tags</code> contenga <strong>tanto</strong> <code>\"express\"</code> <strong>como</strong> <code>\"fragile\"</code>?",
    options:[
      {code:`db.orders.find({ tags:{ $in:["express","fragile"] } })`},
      {code:`db.orders.find({ tags:{ $all:["express","fragile"] } })`},
      {code:`db.orders.find({ tags:["express","fragile"] })`},
      {code:`db.orders.find({ $and:[{ tags:"express" },{ tags:"fragile" }] })`},
    ],
    correct:1,
    explanation:"<strong>b) es correcta.</strong> <code>$all</code> requiere que el array contenga <em>todos</em> los valores. <code>$in</code> devuelve documentos que contengan <em>alguno</em>. c) busca el array exacto sin otros elementos. d) también funciona pero es más verboso."
  },

  // ══════════════════════════════════════════════════════════
  // MONGODB — ÍNDICES
  // ══════════════════════════════════════════════════════════
  {
    db:"mongo",
    q:"Tenés <code>db.orders.find({ status:'PAID' }).sort({ orderDate:-1 })</code>. ¿Cuál índice la optimiza mejor?",
    options:[
      {code:`{ orderDate:-1 }`},
      {code:`{ status:1 }`},
      {code:`{ status:1, orderDate:-1 }`},
      {code:`{ orderDate:-1, status:1 }`},
    ],
    correct:2,
    explanation:"<strong>c) es correcta.</strong> En índices compuestos: primero los campos de igualdad (<code>status</code>), luego los de orden/rango (<code>orderDate</code>). d) tiene el orden invertido — no cubre eficientemente el filtro por status."
  },
  {
    db:"mongo",
    q:"¿Cuál afirmación sobre índices en MongoDB es <strong>falsa</strong>?",
    options:[
      {text:"Crear demasiados índices penaliza las escrituras"},
      {text:"El índice en _id se crea automáticamente"},
      {text:"Una consulta sin índice lanza error en MongoDB"},
      {text:"Un índice TTL elimina documentos automáticamente al vencer"},
    ],
    correct:2,
    explanation:"<strong>c) es la falsa.</strong> MongoDB permite consultas sin índice — hace un collection scan (lento) pero no lanza error. Cassandra sí lanza error ante filtros sin PK ni índice."
  },
  {
    db:"mongo",
    q:"El índice compuesto <code>{ a:1, b:1, c:1 }</code>. ¿Cuáles consultas cubre?",
    options:[
      {text:"Solo consultas que filtren por los tres campos a la vez"},
      {text:"Consultas que filtren por {a}, {a,b} o {a,b,c} — pero NO por {b} o {c} solos"},
      {text:"Cualquier combinación de a, b y c sin importar el orden"},
      {text:"Solo consultas que usen los tres campos en el WHERE"},
    ],
    correct:1,
    explanation:"<strong>b) es correcta.</strong> Los índices compuestos siguen la regla del prefijo: cubren consultas que usen un prefijo continuo desde la izquierda. <code>{a}</code>, <code>{a,b}</code> y <code>{a,b,c}</code> están cubiertos. <code>{b}</code> o <code>{c}</code> solos no."
  },

  // ══════════════════════════════════════════════════════════
  // MONGODB — AGGREGATION
  // ══════════════════════════════════════════════════════════
  {
    db:"mongo",
    q:"¿Cuál pipeline cuenta la cantidad de órdenes por <code>status</code>?",
    options:[
      {code:`db.orders.aggregate([
  { $group:{ _id:"$status", count:{ $sum:1 } } }
])`},
      {code:`db.orders.aggregate([
  { $count:"status" }
])`},
      {code:`db.orders.aggregate([
  { $group:{ status:"$status" } },
  { $count:1 }
])`},
      {code:`db.orders.find({}).groupBy("status")`},
    ],
    correct:0,
    explanation:"<strong>a) es correcta.</strong> <code>$group</code> requiere un <code>_id</code> que define el campo de agrupación y acumuladores como <code>$sum:1</code> para contar. <code>$count</code> cuenta el total sin agrupar. <code>.groupBy()</code> no existe."
  },
  {
    db:"mongo",
    q:"¿Cuál pipeline devuelve el <strong>total promedio por status</strong>, solo para órdenes con <code>total > 50</code>?",
    options:[
      {code:`db.orders.aggregate([
  { $group:{ _id:"$status", avg:{ $avg:"$total" } } },
  { $match:{ total:{ $gt:50 } } }
])`},
      {code:`db.orders.aggregate([
  { $match:{ total:{ $gt:50 } } },
  { $group:{ _id:"$status", avg:{ $avg:"$total" } } }
])`},
      {code:`db.orders.aggregate([
  { $avg:"$total" },
  { $group:{ _id:"$status" } }
])`},
      {code:`db.orders.find({ total:{ $gt:50 } }).groupBy("status").avg("total")`},
    ],
    correct:1,
    explanation:"<strong>b) es correcta.</strong> <code>$match</code> debe ir <em>antes</em> de <code>$group</code> para filtrar primero y reducir el trabajo del agrupamiento. En a) el <code>$match</code> después del <code>$group</code> ya no puede filtrar por <code>total</code> porque ese campo fue agrupado."
  },
  {
    db:"mongo",
    q:"¿Cuál pipeline hace un JOIN entre <code>orders</code> y <code>customers</code> para traer el nombre del cliente?",
    options:[
      {code:`db.orders.aggregate([
  { $join:{ from:"customers",
    localField:"customerid",
    foreignField:"_id", as:"cliente" } }
])`},
      {code:`db.orders.aggregate([
  { $lookup:{ from:"customers",
    localField:"customerid",
    foreignField:"_id", as:"cliente" } }

      {code:`CREATE TABLE products_by_category (\n  category   text,\n  price      decimal,\n  product_id uuid,\n  name       text,\n  PRIMARY KEY (category, price, product_id)\n) WITH CLUSTERING ORDER BY (price DESC);`},
      {code:`CREATE TABLE products_by_category (\n  category   text PRIMARY KEY,\n  price      decimal,\n  product_id uuid,\n  name       text\n);`},
      {code:`CREATE TABLE products_by_category (\n  category   text,\n  price      decimal,\n  product_id uuid,\n  PRIMARY KEY (price, category)\n) WITH CLUSTERING ORDER BY (price DESC);`},
    ],
    correct:1,
    explanation:"<strong>b) es correcta.</strong> <code>PRIMARY KEY (category, price, product_id)</code>: category es la partition key, price y product_id son clustering keys (product_id garantiza unicidad dentro de la partición). <code>CLUSTERING ORDER BY (price DESC)</code> ordena físicamente por precio descendente. En d) la partition key y clustering key están invertidas."
  },
  {
    db:"practica",
    q:`Dada la tabla Cassandra:
<pre>CREATE TABLE users (
  user_id uuid PRIMARY KEY,
  email   text,
  country text
);</pre>
¿Cuál es la mejor interpretación de esta consulta?
<pre>SELECT user_id, email FROM users
WHERE country = 'AR' ALLOW FILTERING;</pre>`,
    options:[
      {text:"Es eficiente porque ALLOW FILTERING fuerza el uso de índices"},
      {text:"Cassandra buscará solo en una partición, por lo que es segura"},
      {text:"Puede ser muy costosa (scan global) porque country no es clave primaria; ALLOW FILTERING permite el filtrado pero no lo optimiza"},
      {text:"No compila: ALLOW FILTERING solo se permite si hay un índice secundario"},
    ],
    correct:2,
    explanation:"<strong>c) es correcta.</strong> <code>country</code> no es parte de la Primary Key ni tiene índice. Cassandra recorre todas las particiones buscando country = 'AR' — un scatter/gather sobre todo el clúster. <code>ALLOW FILTERING</code> fuerza la ejecución pero puede ser extremadamente lento. La solución correcta sería una tabla <code>users_by_country</code> con <code>country</code> como partition key."
  },
  {
    db:"practica",
    q:`Una empresa shardea la colección <code>orders</code>: <code>{ _id, customerId, status, orderDate, total }</code> usando la shard key <code>{ status: 1 }</code>. ¿Cuál es el problema más probable?`,
    options:[
      {text:"Baja cardinalidad: pocos valores de status generarán hotspots — la mayoría de los datos irá a los mismos pocos shards"},
      {text:"La clave es demasiado larga para ser eficiente en el hash"},
      {text:"MongoDB no permite shardear por campos de tipo string"},
      {text:"El shard key debe coincidir siempre con el _id del documento"},
    ],
    correct:0,
    explanation:"<strong>a) es correcta.</strong> <code>status</code> tiene muy pocos valores distintos (baja cardinalidad). Si hay 3 valores posibles, solo puede haber 3 shards máximo. El 80% de las órdenes probablemente estén en 'delivered', creando un hotspot masivo. Una mejor shard key sería <code>{ customerId: 1 }</code> o <code>{ _id: 1 }</code> que tienen alta cardinalidad."
  },
  {
    db:"practica",
    q:`Crear tabla <code>orders_by_customer</code> en Cassandra: <code>customer_id</code> como partition key, <code>order_ts</code> como clustering key (fecha DESC), <code>order_id</code> como identificador adicional. ¿Cuál CQL es correcta?`,
    options:[
      {code:`CREATE TABLE orders_by_customer (\n  customer_id text,\n  order_ts    timestamp,\n  order_id    uuid,\n  total       decimal,\n  status      text,\n  PRIMARY KEY (customer_id, order_ts, order_id)\n) WITH CLUSTERING ORDER BY (order_ts DESC);`},
      {code:`CREATE TABLE orders_by_customer (\n  customer_id text,\n  order_ts    timestamp,\n  order_id    uuid PRIMARY KEY,\n  total       decimal,\n  status      text\n);`},
      {code:`CREATE TABLE orders_by_customer (\n  customer_id text,\n  order_ts    timestamp,\n  order_id    uuid,\n  PRIMARY KEY (order_ts, customer_id)\n) WITH CLUSTERING ORDER BY (order_ts DESC);`},
      {code:`CREATE TABLE orders_by_customer (\n  customer_id text,\n  order_ts    timestamp,\n  order_id    uuid,\n  PRIMARY KEY ((customer_id, order_ts), order_id)\n) WITH CLUSTERING ORDER BY (order_id DESC);`},
    ],
    correct:0,
    explanation:"<strong>a) es correcta.</strong> <code>PRIMARY KEY (customer_id, order_ts, order_id)</code>: customer_id es la partition key, order_ts y order_id son clustering keys. <code>CLUSTERING ORDER BY (order_ts DESC)</code> ordena las órdenes de más reciente a más antigua dentro de cada cliente. En b) order_id como PK simple no permite las consultas por customer. En c) la partition key y clustering key están invertidas."
  },

];

// ──────────────────────────────────────────────
// ESTADO Y LÓGICA
// ──────────────────────────────────────────────
const state = new Array(questions.length).fill(null);
let current = 0;
let score   = 0;

const DB_LABELS = { mongo:'MongoDB', cassandra:'Cassandra', neo4j:'Neo4j', teoria:'Teoría', grafo:'Grafos', practica:'Práctica' };

function escHtml(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function render(){
  const q = questions[current];
  const s = state[current];
  const letters = ['a','b','c','d'];

  const optionsHTML = q.options.map((opt,i)=>{
    const content = opt.code
      ? `<span class="text"><pre><code>${escHtml(opt.code)}</code></pre></span>`
      : `<span class="text">${opt.text}</span>`;
    let cls = 'option';
    if(s !== null){
      cls += ' disabled';
      if(i === q.correct)          cls += ' correct';
      else if(i === s.answeredIdx) cls += ' wrong';
      else                          cls += ' dimmed';
    }
    const click = s === null ? `onclick="answer(${i})"` : '';
    return `<div class="${cls}" ${click}><span class="letter">${letters[i]}</span>${content}</div>`;
  }).join('');

  let feedbackHTML = '';
  if(s !== null){
    const cls  = s.wasCorrect ? 'feedback show ok' : 'feedback show fail';
    const icon = s.wasCorrect ? '✓ Correcto' : '✗ Incorrecto';
    feedbackHTML = `<div class="${cls}"><strong>${icon}</strong>${q.explanation}</div>`;
  }

  const showNext = s !== null;
  const showPrev = current > 0;
  const isLast   = current === questions.length - 1;

  document.getElementById('quiz-container').innerHTML = `
    <div class="card">
      <span class="badge ${q.db}">${DB_LABELS[q.db]}</span>
      <h2>${q.q}</h2>
      <div class="options">${optionsHTML}</div>
      ${feedbackHTML}
      <div class="btn-row">
        <button class="btn-prev ${showPrev?'show':''}" onclick="prev()">← Anterior</button>
        <button class="btn-next ${showNext?'show':''}" onclick="next()">
          ${isLast ? 'Ver resultado' : 'Siguiente →'}
        </button>
      </div>
    </div>`;

  updateProgress();
  if(s !== null) window.scrollTo({top:0, behavior:'smooth'});
}

function answer(idx){
  if(state[current] !== null) return;
  const wasCorrect = idx === questions[current].correct;
  if(wasCorrect) score++;
  state[current] = { answeredIdx:idx, wasCorrect };
  render();
}

function next(){
  if(current < questions.length - 1){ current++; render(); }
  else showScore();
}

function prev(){
  if(current > 0){ current--; render(); }
}

function updateProgress(){
  const total    = questions.length;
  const answered = state.filter(s=>s!==null).length;
  document.getElementById('progress-fill').style.width = (answered/total*100)+'%';
  document.getElementById('prog-text').textContent  = `Pregunta ${current+1} de ${total}`;
  document.getElementById('score-text').textContent = `${score} correctas`;
}

function showScore(){
  document.getElementById('quiz-container').style.display    = 'none';
  document.getElementById('progress-bar-wrap').style.display = 'none';
  const screen = document.getElementById('score-screen');
  screen.style.display = 'block';
  document.getElementById('final-score').textContent = `${score} / ${questions.length}`;

  // breakdown por categoría
  const cats = {};
  questions.forEach((q,i)=>{
    if(!cats[q.db]) cats[q.db] = {correct:0, total:0};
    cats[q.db].total++;
    if(state[i]?.wasCorrect) cats[q.db].correct++;
  });
  document.getElementById('breakdown').innerHTML = Object.entries(cats).map(([db,v])=>
    `<div class="breakdown-item"><span>${v.correct}/${v.total}</span>${DB_LABELS[db]}</div>`
  ).join('');

  const pct = score / questions.length;
  let msg = '';
  if     (pct===1)   msg='Perfecto. Dominás todo el temario.';
  else if(pct>=0.85) msg='Muy bien. Repasá los que fallaste.';
  else if(pct>=0.65) msg='Bien encaminado. Vale repasar las reglas de PK en Cassandra y CAP.';
  else               msg='Seguí practicando — prestá atención a partition keys, ACID/BASE y operadores.';
  document.getElementById('final-msg').textContent = msg;
  window.scrollTo({top:0, behavior:'smooth'});
}

function restart(){
  current = 0; score = 0; state.fill(null);
  document.getElementById('quiz-container').style.display    = 'block';
  document.getElementById('progress-bar-wrap').style.display = 'block';
  document.getElementById('score-screen').style.display      = 'none';
  render();
}

render();
</script>
